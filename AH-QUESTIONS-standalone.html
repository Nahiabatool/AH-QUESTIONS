<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH-QUESTIONS PART-2 (IR-2)</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

:root {
  --bg-dark: #0f1419;
  --bg-card: #1a2332;
  --accent: #0ea5e9;
  --accent-hover: #38bdf8;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: #334155;
  --correct: #22c55e;
  --wrong: #ef4444;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.6;
  overflow-x: hidden;
}

.hidden {
  display: none !important;
}

/* Ensure sections stay hidden on mobile */
#landing.hidden,
#quiz-section.hidden,
#results-section.hidden {
  display: none !important;
  visibility: hidden !important;
  position: absolute !important;
  left: -99999px !important;
  width: 1px !important;
  height: 1px !important;
  overflow: hidden !important;
  clip: rect(0, 0, 0, 0) !important;
}

/* Landing - dark theme to match quiz section */
.landing {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg-dark);
}

.landing-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  padding: 2rem 2.5rem;
  max-width: 720px;
  width: 100%;
}

.landing-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.35rem;
  letter-spacing: -0.02em;
}

.landing-author {
  font-size: 1.1rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
}

.landing-options {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.75rem 1rem;
}

.landing-options label:not(.checkbox-label) {
  font-size: 0.95rem;
  color: var(--text);
  margin-right: 0.25rem;
}

.landing-options select {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-dark);
  color: var(--text);
  min-width: 180px;
}

.landing-options .checkbox-label {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.95rem;
  color: var(--text);
  cursor: pointer;
  margin-left: 0.5rem;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.landing-options .checkbox-label input {
  width: 1rem;
  height: 1rem;
  cursor: pointer;
}

.landing-options .btn-primary {
  margin-left: 0.5rem;
}

.custom-quiz-options {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem 1rem;
  margin-top: 0.5rem;
}

.custom-quiz-options.hidden {
  display: none !important;
}

.custom-quiz-options select {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-dark);
  color: var(--text);
  min-width: 140px;
}

.custom-quiz-options input[type="number"] {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.4rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 5rem;
  background: var(--bg-dark);
  color: var(--text);
}

.custom-quiz-hint {
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Buttons */
.btn {
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  padding: 0.875rem 1.75rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Quiz section */
.quiz-section {
  min-height: 100vh;
  padding: 2rem 1rem;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.quiz-container {
  width: 100%;
  max-width: 640px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  color: var(--text-muted);
}

.quiz-score {
  color: var(--accent);
  font-weight: 600;
}

.quiz-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
}

.question-text {
  font-size: 1.1rem;
  font-weight: 500;
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  touch-action: manipulation;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  background: var(--bg-dark);
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: left;
  font-size: 0.95rem;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.option:hover {
  border-color: var(--accent);
  background: rgba(14, 165, 233, 0.08);
}

.option.selected {
  border-color: var(--accent);
  background: rgba(14, 165, 233, 0.12);
}

.option.correct {
  border-color: var(--correct);
  background: rgba(34, 197, 94, 0.12);
}

.option.wrong {
  border-color: var(--wrong);
  background: rgba(239, 68, 68, 0.12);
}

.option-letter {
  font-weight: 700;
  color: var(--accent);
  min-width: 1.5rem;
}

.quiz-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 2rem;
  gap: 1rem;
  touch-action: manipulation;
}

.quiz-nav .btn {
  min-width: 120px;
}

/* Results */
.results-section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.results-container {
  text-align: center;
  max-width: 400px;
}

.results-container h1 {
  font-size: 1.75rem;
  margin-bottom: 1rem;
}

.results-score {
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

.results-score span {
  color: var(--accent);
  font-weight: 700;
}

.results-percent {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2rem;
}

.results-container .btn {
  padding: 0.875rem 2rem;
}

/* ========== RESPONSIVE: Tablet & Mobile ========== */
@media (max-width: 768px) {
  .landing {
    padding: 1.25rem;
    align-items: flex-start;
    padding-top: 2rem;
  }
  .landing-card {
    padding: 1.75rem 2rem;
    margin: 0 auto;
  }
  .landing-title {
    font-size: 1.5rem;
  }
  .landing-options {
    flex-direction: column;
    align-items: stretch;
  }
  .landing-options select {
    min-width: 0;
    width: 100%;
  }
  .landing-options .btn-primary {
    margin-left: 0;
  }
  .custom-quiz-options {
    flex-direction: column;
    display: flex !important;
  }
  .custom-quiz-options.hidden {
    display: none !important;
  }
  .custom-quiz-options select,
  #custom-quiz-source {
    min-width: 0;
    width: 100%;
    font-size: 16px;
    min-height: 44px;
    -webkit-appearance: menulist;
    appearance: menulist;
  }
  .quiz-section {
    padding: 1rem;
  }
  .quiz-header {
    flex-wrap: wrap;
    font-size: 0.85rem;
  }
  .quiz-card {
    padding: 1.25rem;
  }
  .question-text {
    font-size: 1rem;
  }
  .option {
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    min-height: 40px;
  }
  .quiz-nav {
    flex-wrap: wrap;
  }
  .quiz-nav .btn {
    min-width: 0;
    flex: 1 1 120px;
    min-height: 36px;
    padding: 0.5rem 1rem;
  }
  .results-section {
    padding: 1.5rem;
  }
  .results-percent {
    font-size: 2rem;
  }
  .btn {
    min-height: 36px;
    padding: 0.5rem 1rem;
  }
}
@media (max-width: 480px) {
  .landing {
    padding: 1rem;
  }
  .landing-card {
    padding: 1.25rem 1.5rem;
  }
  .landing-title {
    font-size: 1.35rem;
  }
  .landing-options select,
  .custom-quiz-options select,
  #custom-quiz-source,
  .custom-quiz-options input[type="number"] {
    font-size: 16px;
  }
  .quiz-section {
    padding: 0.75rem;
  }
  .quiz-header {
    flex-direction: column;
    align-items: flex-start;
  }
  .quiz-card {
    padding: 1rem;
  }
  .question-text {
    font-size: 0.95rem;
  }
  .option {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
  }
  .quiz-nav {
    flex-direction: column;
  }
  .quiz-nav .btn {
    width: 100%;
    min-height: 36px;
    padding: 0.5rem 1rem;
  }
  .results-container .btn {
    width: 100%;
    min-height: 36px;
    padding: 0.5rem 1rem;
  }
}

</style>

<body>
  <!-- Landing Page -->
  <section id="landing" class="landing">
    <div class="landing-card">
      <h1 class="landing-title">AH-QUESTIONS PART-2 (IR-2)</h1>
      <p class="landing-author">(by Syed Abbas Haider Sherazi)</p>
      <div class="landing-options">
        <label for="question-set">Select Question Set:</label>
        <select id="question-set">
          <option value="1">COMM (VFR-IFR Communications, 153 questions)</option>
          <option value="2">Set 2 (Flight Planning, 815 questions)</option>
          <option value="3">Set 3 (Radio Navigation, 1059 questions)</option>
          <option value="4">Set 4 (Meteorology, 1289 questions)</option>
          <option value="custom">Custom quiz (merge all & choose number)</option>
        </select>
        <div id="custom-quiz-options" class="custom-quiz-options hidden">
          <label for="custom-quiz-source">Drawn from:</label>
          <select id="custom-quiz-source" aria-label="Drawn from">
            <option value="all">All sets (merged)</option>
            <option value="1">COMM</option>
            <option value="2">FLIGHT PLANM</option>
            <option value="3">R NAV</option>
            <option value="4">MET</option>
          </select>
          <label for="custom-quiz-count">Number of questions:</label>
          <input type="number" id="custom-quiz-count" min="1" value="20" aria-label="Number of questions">
          <span class="custom-quiz-hint">Drawn from selected source.</span>
        </div>
        <label class="checkbox-label">
          <input type="checkbox" id="shuffle-questions">
          Shuffle Questions
        </label>
        <button type="button" id="start-btn" class="btn btn-primary">Start Set</button>
      </div>
    </div>
  </section>

  <!-- Quiz Section (hidden initially) -->
  <section id="quiz-section" class="quiz-section hidden" hidden>
    <div class="quiz-container">
      <div class="quiz-header">
        <span class="quiz-progress">Question <span id="current-num">1</span> of <span id="total-num">153</span></span>
        <span class="quiz-score">Score: <span id="score">0</span></span>
      </div>
      <div class="quiz-card">
        <h2 id="question-text" class="question-text"></h2>
        <div id="options" class="options"></div>
        <div class="quiz-nav">
          <button id="back-to-home-btn" class="btn btn-secondary">Back to home</button>
          <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
          <button id="next-btn" class="btn btn-primary">Next</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Results Section (hidden initially) -->
  <section id="results-section" class="results-section hidden" hidden>
    <div class="results-container">
      <h1>Quiz Complete</h1>
      <p class="results-score">You scored <span id="final-score">0</span> out of <span id="final-total">153</span></p>
      <p class="results-percent"><span id="percent">0</span>%</p>
      <button type="button" id="restart-btn" class="btn btn-primary">Restart Quiz</button>
    </div>
  </section>

  <script>
// VFR-IFR COMMUNICATIONS - All 153 questions from the PDF (Ref CPL A AND H)
const QUIZ_QUESTIONS = [
  { question: "What is normally used for ATIS broadcasts?", options: ["DME voice channel", "Voice channel of an ILS", "NDB frequencies", "Discreet VHF frequency or/and VOR"], correct: 3 },
  { question: "What does the term BLIND TRANSMISSION mean?", options: ["A transmission where no reply is required from the receiving station", "A transmission of information relating to air navigation that is not addressed to a specific station or stations", "A transmission of messages relating to en-route weather information which may affect the safety of aircraft operations that is not addressed to a specific station or stations", "A transmission from one station to another station in circumstances where two-way communication cannot be established but it is believed that the called station is able to receive the transmission"], correct: 3 },
  { question: "Which abbreviation is used for the term CONTROL ZONE?", options: ["CTA", "CZ", "CTZ", "CTR"], correct: 3 },
  { question: "What does the abbreviation FIR mean?", options: ["Flight information required", "Flight information region", "Flow information received", "Flight information radar"], correct: 1 },
  { question: "What does the abbreviation HJ mean?", options: ["No specific working hours", "Sunset to sunrise", "Sunrise to sunset", "Continuous day and night service"], correct: 2 },
  { question: "What does the abbreviation HX mean?", options: ["Continuous day and night service", "Sunrise to sunset", "Sunset to sunrise", "No specific working hours"], correct: 3 },
  { question: "Which abbreviation is used for Co-ordinated universal time?", options: ["UTC", "CUT", "GMT", "COUT"], correct: 0 },
  { question: "What does the abbreviation AFIS mean?", options: ["Aerodrome flashing identification signal", "Automatic flight information service", "Aeronautical flight information system", "Aerodrome flight information service"], correct: 3 },
  { question: "The three main categories of aeronautical communications service are:", options: ["IFR, VFR, SVFR", "Air Ground, Flight Information Service, ATC", "Ground, Approach, Tower", "Ground/Tower, Approach/Departure, Area Radar"], correct: 1 },
  { question: "What does QTE mean?", options: ["Magnetic heading to the station", "Magnetic bearing from the station", "True heading to the station (no wind)", "True bearing from the station"], correct: 3 },
  { question: "What is the Q-code for MAGNETIC HEADING TO THE STATION (NO WIND)?", options: ["QDM", "QDR", "QNE", "QTE"], correct: 0 },
  { question: "What does QDM mean?", options: ["True bearing from the station", "Magnetic bearing from the station", "True heading to the station (no wind)", "Magnetic heading to the station (no wind)"], correct: 3 },
  { question: "QNH is the Q-code to indicate?", options: ["The atmospheric pressure measured at the aerodrome reference point (ARP)", "The atmospheric pressure at aerodrome elevation (or at runway threshold)", "The altimeter sub-scale setting to obtain elevation when on the ground", "The atmospheric pressure referred to the highest obstacle located on the surface of an aerodrome"], correct: 2 },
  { question: "If you are requested to report your height, to which Q-code-setting would you refer?", options: ["QBI", "QNH", "QDM", "QFE"], correct: 3 },
  { question: "What is the Q-code for magnetic bearing from the station?", options: ["QTE", "QDR", "QDM", "QFE"], correct: 1 },
  { question: "Which Q-code is used to report altitude?", options: ["QNH", "AFE", "QFF", "QNJ"], correct: 0 },
  { question: "What is the Q-code for TRUE BEARING FROM THE STATION?", options: ["QFE", "QDR", "QDM", "QTE"], correct: 3 },
  { question: "What does QDR mean?", options: ["True heading to the station", "Magnetic heading to the station (no wind)", "True bearing from the station", "Magnetic bearing from the station"], correct: 2 },
  { question: "An aircraft is requested to fly at 2500 feet on the airfield QFE. All references to vertical position should now be referred to as:", options: ["Height", "Altitude", "Pressure Altitude", "Flight Level"], correct: 0 },
  { question: "If a ground D/F controller passes a bearing thus: your true bearing is 256° class alpha. This means:", options: ["QTE accurate to ±5°", "QUJ accurate to ±3°", "QDR accurate to ±2°", "QTE accurate to ±2°"], correct: 3 },
  { question: "You obtain a clearance to descend to an ALTITUDE of 2500 feet, in the UK the clearance should also include the following pressure setting or settings:", options: ["QFE", "QNE", "QFE or QNH", "QNH"], correct: 3 },
  { question: "Air traffic control messages (clearances, instructions, etc) belong to the category of:", options: ["Flight safety messages", "Flight regularity messages", "Service messages", "Class B messages"], correct: 0 },
  { question: "Which of the messages listed below shall not be handled by the aeronautical mobile service?", options: ["Meteorological messages", "Radio teletype messages", "Flight safety messages", "Urgency messages"], correct: 1 },
  { question: "The message to an aeronautical ground station PLEASE CALL A TAXI-CAB FOR US. WE WILL ARRIVE AT 1045 IS:", options: ["An unauthorized message", "A flight regularity message", "A flight safety message", "An urgency message"], correct: 0 },
  { question: "The priority of the instruction TAXI TO RUNWAY 05 is:", options: ["Same as LINE-UP RUNWAY 07 AND WAIT", "Greater than TRANSMIT FOR QDM", "Greater than CAUTION, CONSTRUCTION WORK LEFT OF TAXIWAY", "Less than CLEARED TO LAND"], correct: 2 },
  { question: "The order of priority of the following messages in the aeronautical mobile service is:", options: ["Flight regularity message, distress message, meteorological message", "Meteorological message, direction finding message, flight safety message", "Flight safety message, meteorological message, flight regularity message", "Flight safety message, direction finding message, urgency message"], correct: 3 },
  { question: "Flight safety messages are:", options: ["Operation messages concerning non-routine landings", "Air traffic control messages", "Messages concerning the safety of an aircraft, a vessel, any other vehicle or a person", "Messages relating to direction finding"], correct: 2 },
  { question: "A message concerning an aircraft being threatened by grave and imminent danger, requiring immediate assistance is called:", options: ["Flight safety message", "Distress message", "Urgency message", "Class B message"], correct: 1 },
  { question: "The message addressed to an Area Control Center REQUEST RADAR VECTORS TO CIRCUMNAVIGATE ADVERSE WEATHER is:", options: ["A meteorological message", "A flight safety message", "An urgency message", "A message relating to direction finding"], correct: 0 },
  { question: "The clearance: CLEARED FOR IMMEDIATE TAKE-OFF RUNWAY 03 is:", options: ["A flight safety message", "An urgency message", "An unauthorized message", "A flight regularity message"], correct: 3 },
  { question: "The order of priority of the following messages in the aeronautical mobile service is:", options: ["Distress message, urgency message, direction finding message", "Direction finding message, distress message, urgency message", "Distress message, flight safety message, urgency message", "Meteorological message, direction finding message, flight regularity Message"], correct: 2 },
  { question: "A message concerning aircraft parts and material urgently required is:", options: ["A flight security message", "An urgency message", "A flight safety message", "A flight regularity message"], correct: 3 },
  { question: "Aeronautical messages are given an order of priority. Which of the following statements reflects the correct order of priority?", options: ["Meteorological messages take precedence over Direction Finding messages", "Flight Safety messages will be handled before Urgency messages", "Messages relating to Direction Finding take precedence over Flight Regularity messages", "Flight Safety messages take precedence over Direction Finding messages"], correct: 2 },
  { question: "You receive the following ATC message: G-ABCD after departure cleared to zone boundary via route Charlie. Climb to altitude 2000 feet QNH1010, squawk 6318. This message is:", options: ["a clearance to take-off and depart to the zone boundary via route Charlie at 2000 feet", "a clearance to line-up", "a Flight Safety message", "a Flight Regularity message"], correct: 3 },
  { question: "What is the correct way to transmit and read back frequency 120.375 MHz (VHF channel separated by 25 KHz):", options: ["One two zero decimal three seven", "One twenty decimal three seven", "One two zero three seven", "One two zero three seven"], correct: 0 },
  { question: "What is the correct way of transmitting the number 3500 when indicating an altitude or a height?", options: ["three five double zero", "three five zero zero", "three five hundred", "three thousand five hundred"], correct: 3 },
  { question: "During the transmission of numbers containing a decimal point:", options: ["The term DECIMAL can be omitted if no chance of misunderstanding exists", "The term DECIMAL can be omitted with friendly ATS units only", "The term DECIMAL must always be transmitted", "The term DECIMAL must be spoken only if followed by three digits"], correct: 2 },
  { question: "What is the correct way of transmitting 1001 as a QNH?", options: ["QNH one double 0 one", "QNH one zero zero one", "QNH one thousand and one", "QNH one double zero one"], correct: 1 },
  { question: "An aircraft is flying north-east at 2500 feet. TOWER requests heading and level. What is the correct response:", options: ["045 and 2.500", "Heading north-east at level 25", "Heading 45 at 2.500 feet", "Heading 045 at 2.500 feet"], correct: 0 },
  { question: "An altitude of 2600 feet is transmitted as:", options: ["two thousand six hundred feet", "two six hundred feet", "two six thousand feet", "two six zero zero feet"], correct: 0 },
  { question: "When transmitting time, which time system shall be used?", options: ["Local time (LT), 24-hour clock", "Co-ordinated universal time (UTC)", "No specific system, as only the minutes are normally required", "Local time (LT) A.M. and P.M."], correct: 1 },
  { question: "The time is 9:20 A.M. What is the correct way of transmitting this time if there is no possibility of confusion about the hour?", options: ["Two zero", "Twenty", "Two zero this hour", "Nine twenty A.M."], correct: 0 },
  { question: "The time is 4:15 PM. What is the correct way of transmitting this time if there is any possibility of confusion about the hour?", options: ["One six one five", "Four fifteen PM", "Sixteen fifteen", "Four fifteen in the afternoon"], correct: 2 },
  { question: "A time of \"11.20\" hours is transmitted as:", options: ["one one two zero or two zero", "eleven twenty hours", "eleven twenty", "twenty past eleven"], correct: 0 },
  { question: "The time of 1400 UTC is transmitted as:", options: ["one thousand four hundred", "one four zero zero", "fourteen hundred UTC", "one four zero zero uniform tango Charlie"], correct: 1 },
  { question: "When may the name of the location or the call sign suffix in the call sign of an aeronautical station be omitted?", options: ["In dense traffic during rush hours", "Never", "Only after the aeronautical station has used the abbreviated call sign", "When satisfactory communication has been established and provided it will not be confusing to do so."], correct: 3 },

  const finalTotalEl = document.getElementById('final-total');
  const percentEl = document.getElementById('percent');

  const shuffleCheckbox = document.getElementById('shuffle-questions');
  let currentQuestions = [];
  let total = 0;
  let currentIndex = 0;
  let userAnswers = [];

  function shuffleArray(arr) {
    var copy = arr.slice();
    for (var i = copy.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = copy[i];
      copy[i] = copy[j];
      copy[j] = t;
    }
    return copy;
  }

  function setSectionVisibility(showEl, hideEl1, hideEl2) {
    showEl.classList.remove('hidden');
    showEl.removeAttribute('hidden');
    hideEl1.classList.add('hidden');
    hideEl1.setAttribute('hidden', '');
    hideEl2.classList.add('hidden');
    hideEl2.setAttribute('hidden', '');
  }

  function showLanding() {
    setSectionVisibility(landing, quizSection, resultsSection);
  }

  function showQuiz() {
    setSectionVisibility(quizSection, landing, resultsSection);
  }

  function showResults() {
    setSectionVisibility(resultsSection, landing, quizSection);
    const correctCount = currentQuestions.reduce(function (count, q, i) {
      return count + (userAnswers[i] === q.correct ? 1 : 0);
    }, 0);
    finalScoreEl.textContent = correctCount;
    finalTotalEl.textContent = total;
    percentEl.textContent = total ? Math.round((correctCount / total) * 100) : 0;
  }

  function renderQuestion() {
    const q = currentQuestions[currentIndex];
    const answered = userAnswers[currentIndex] >= 0;
    currentNumEl.textContent = currentIndex + 1;
    totalNumEl.textContent = total;
    var qText = (q && (q.question || q.text || '')) || '(Question not available)';
    questionText.textContent = qText;

    optionsContainer.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];
    var opts = Array.isArray(q.options) ? q.options : [];
    opts.forEach(function (opt, i) {
      const label = document.createElement('label');
      var optClass = 'option';
      if (answered) {
        if (i === q.correct) optClass += ' correct';
        if (i === userAnswers[currentIndex] && i !== q.correct) optClass += ' wrong';
        if (i === userAnswers[currentIndex]) optClass += ' selected';
      } else if (userAnswers[currentIndex] === i) {
        optClass += ' selected';
      }
      label.className = optClass;
      label.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + opt + '</span>';
      if (!answered) {
        var selectOption = function () {
          userAnswers[currentIndex] = i;
          document.querySelectorAll('#options .option').forEach(function (el) {
            el.classList.remove('selected', 'correct', 'wrong');
          });
          label.classList.add('selected');
          var opts = optionsContainer.querySelectorAll('.option');
          opts[q.correct].classList.add('correct');
          if (i !== q.correct) label.classList.add('wrong');
          updateScoreDisplay();
        };
        label.addEventListener('click', selectOption);
        label.addEventListener('touchend', function (e) {
          e.preventDefault();
          selectOption();
        }, { passive: false });
      }
      optionsContainer.appendChild(label);
    });

    if (currentIndex === 0) {
      if (backToHomeBtn) backToHomeBtn.classList.remove('hidden');
      prevBtn.classList.add('hidden');
      prevBtn.disabled = true;
    } else {
      if (backToHomeBtn) backToHomeBtn.classList.add('hidden');
      prevBtn.classList.remove('hidden');
      prevBtn.disabled = false;
    }
    if (currentIndex === total - 1) {
      nextBtn.textContent = 'Finish';
    } else {
      nextBtn.textContent = 'Next';
    }
  }

  function updateScoreDisplay() {
    let correctCount = 0;
    for (let i = 0; i <= currentIndex; i++) {
      if (userAnswers[i] === currentQuestions[i].correct) correctCount++;
    }
    scoreEl.textContent = correctCount + ' / ' + (currentIndex + 1);
  }

  function goNext() {
    if (currentIndex === total - 1) {
      showResults();
      return;
    }
    currentIndex++;
    renderQuestion();
    updateScoreDisplay();
  }

  function goPrev() {
    if (currentIndex === 0) return;
    currentIndex--;
    renderQuestion();
    updateScoreDisplay();
  }

  function isValidQuestion(q) {
    if (!q || typeof q !== 'object') return false;
    var text = (q.question || q.text || '').trim();
    if (!text || !Array.isArray(q.options) || q.options.length === 0) return false;
    if (/^Question\s+\d+$/i.test(text)) return false;
    return true;
  }

  function filterValid(questions) {
    return (questions || []).filter(isValidQuestion);
  }

  function getMergedQuestions() {
    var set1 = typeof QUIZ_QUESTIONS !== 'undefined' ? QUIZ_QUESTIONS : [];
    var set2 = typeof QUIZ_QUESTIONS_SET2 !== 'undefined' ? QUIZ_QUESTIONS_SET2 : [];
    var set3 = typeof QUIZ_QUESTIONS_SET3 !== 'undefined' ? QUIZ_QUESTIONS_SET3 : [];
    var set4 = typeof QUIZ_QUESTIONS_SET4 !== 'undefined' ? QUIZ_QUESTIONS_SET4 : [];
    return filterValid(set1.slice().concat(set2).concat(set3).concat(set4));
  }

  function getSourceForCustom(sourceValue) {
    var raw;
    if (sourceValue === '4' && typeof QUIZ_QUESTIONS_SET4 !== 'undefined') raw = QUIZ_QUESTIONS_SET4.slice();
    else if (sourceValue === '3' && typeof QUIZ_QUESTIONS_SET3 !== 'undefined') raw = QUIZ_QUESTIONS_SET3.slice();
    else if (sourceValue === '2' && typeof QUIZ_QUESTIONS_SET2 !== 'undefined') raw = QUIZ_QUESTIONS_SET2.slice();
    else if (sourceValue === '1' && typeof QUIZ_QUESTIONS !== 'undefined') raw = QUIZ_QUESTIONS.slice();
    else raw = getMergedQuestions();
    return filterValid(raw);
  }

  function updateCustomQuizMax() {
    if (!customCountInput) return;
    var sourceSelect = document.getElementById('custom-quiz-source');
    var sourceVal = sourceSelect ? sourceSelect.value : 'all';
    var pool = getSourceForCustom(sourceVal);
    var maxQ = Math.max(1, pool.length);
    customCountInput.max = maxQ;
    if (parseInt(customCountInput.value, 10) > maxQ) customCountInput.value = maxQ;
  }

  var setSelect = document.getElementById('question-set');
  var customOptions = document.getElementById('custom-quiz-options');
  var customCountInput = document.getElementById('custom-quiz-count');
  var customSourceSelect = document.getElementById('custom-quiz-source');

  if (typeof QUIZ_QUESTIONS_SET2 === 'undefined' && customSourceSelect) {
    var opt2 = customSourceSelect.querySelector('option[value="2"]');
    if (opt2) opt2.disabled = true;
  }

  function toggleCustomOptions() {
    if (!setSelect || !customOptions) return;
    if (setSelect.value === 'custom') {
      customOptions.classList.remove('hidden');
      updateCustomQuizMax();
    } else {
      customOptions.classList.add('hidden');
    }
  }
  if (setSelect && customOptions && customCountInput) {
    setSelect.addEventListener('change', toggleCustomOptions);
    setSelect.addEventListener('input', toggleCustomOptions);
  }
  if (customSourceSelect && customCountInput) {
    customSourceSelect.addEventListener('change', updateCustomQuizMax);
  }

  addTouchClick(startBtn, function () {
    var setValue = setSelect ? setSelect.value : '1';
    var source;
    if (setValue === 'custom') {
      var sourceVal = customSourceSelect ? customSourceSelect.value : 'all';
      source = getSourceForCustom(sourceVal);
      if (source.length === 0) source = filterValid(typeof QUIZ_QUESTIONS !== 'undefined' ? QUIZ_QUESTIONS.slice() : []);
      var n = Math.max(1, Math.min(source.length, parseInt(customCountInput && customCountInput.value, 10) || 20));
      source = shuffleCheckbox && shuffleCheckbox.checked ? shuffleArray(source) : source.slice();
      currentQuestions = source.slice(0, n);
    } else {
      if (setValue === '4' && typeof QUIZ_QUESTIONS_SET4 !== 'undefined') source = QUIZ_QUESTIONS_SET4;
      else if (setValue === '3' && typeof QUIZ_QUESTIONS_SET3 !== 'undefined') source = QUIZ_QUESTIONS_SET3;
      else if (setValue === '2' && typeof QUIZ_QUESTIONS_SET2 !== 'undefined') source = QUIZ_QUESTIONS_SET2;
      else source = QUIZ_QUESTIONS;
      source = filterValid(shuffleCheckbox && shuffleCheckbox.checked ? shuffleArray(source) : source.slice());
      currentQuestions = source;
    }
    total = currentQuestions.length;
    if (total === 0) return;
    userAnswers = new Array(total).fill(-1);
    currentIndex = 0;
    showQuiz();
    renderQuestion();
    scoreEl.textContent = '0 / 1';
  });

  addTouchClick(restartBtn, function () {
    userAnswers = new Array(total).fill(-1);
    currentIndex = 0;
    showQuiz();
    renderQuestion();
    scoreEl.textContent = '0 / 1';
  });

  function addTouchClick(el, handler) {
    if (!el) return;
    var lastTouch = 0;
    el.addEventListener('click', function (e) {
      if (Date.now() - lastTouch < 400) return;
      handler(e);
    });
    el.addEventListener('touchend', function (e) {
      lastTouch = Date.now();
      e.preventDefault();
      handler(e);
    }, { passive: false });
  }

  if (backToHomeBtn) addTouchClick(backToHomeBtn, showLanding);
  addTouchClick(prevBtn, goPrev);
  addTouchClick(nextBtn, goNext);

  document.addEventListener('keydown', function (e) {
    if (quizSection.classList.contains('hidden')) return;
    var q = currentQuestions[currentIndex];
    var answered = q && userAnswers[currentIndex] >= 0;
    var key = e.key.toLowerCase();
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      goNext();
      return;
    }
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      goPrev();
      return;
    }
    if (key === 'a' || key === 'b' || key === 'c' || key === 'd') {
      var optionIndex = key.charCodeAt(0) - 97;
      if (answered || !q || optionIndex >= q.options.length) return;
      e.preventDefault();
      userAnswers[currentIndex] = optionIndex;
      renderQuestion();
      updateScoreDisplay();
    }
  });

  var setCount = (setSelect && setSelect.value === '4' && typeof QUIZ_QUESTIONS_SET4 !== 'undefined')
    ? QUIZ_QUESTIONS_SET4.length
    : (setSelect && setSelect.value === '3' && typeof QUIZ_QUESTIONS_SET3 !== 'undefined')
    ? QUIZ_QUESTIONS_SET3.length
    : (setSelect && setSelect.value === '2' && typeof QUIZ_QUESTIONS_SET2 !== 'undefined')
    ? QUIZ_QUESTIONS_SET2.length
    : (typeof QUIZ_QUESTIONS !== 'undefined' ? QUIZ_QUESTIONS.length : 0);
  totalNumEl.textContent = setCount;
  if (setSelect) setSelect.addEventListener('change', function () {
    if (setSelect.value === 'custom') return;
    var c = (setSelect.value === '4' && typeof QUIZ_QUESTIONS_SET4 !== 'undefined') ? QUIZ_QUESTIONS_SET4.length
      : (setSelect.value === '3' && typeof QUIZ_QUESTIONS_SET3 !== 'undefined') ? QUIZ_QUESTIONS_SET3.length
      : (setSelect.value === '2' && typeof QUIZ_QUESTIONS_SET2 !== 'undefined') ? QUIZ_QUESTIONS_SET2.length
      : (typeof QUIZ_QUESTIONS !== 'undefined' ? QUIZ_QUESTIONS.length : 0);
    totalNumEl.textContent = c;
  });
})();


</script>
</body>
</html>
